apiVersion: apps/v1
kind: Deployment
metadata:
  name: preview-demo
  namespace: preview-demo
  labels:
    app: preview-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: preview-demo
  template:
    metadata:
      labels:
        app: preview-demo
    spec:
      containers:
        - name: preview-demo
          image: preview-demo:local
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          env:
            - name: APP_NAME
              value: "preview-demo"
            - name: BRANCH_NAME
              value: "main"
            - name: COMMIT_SHA
              value: "local-dev"
            - name: ENVIRONMENT_NAME
              value: "preview-demo"
            - name: DEPLOYED_AT
              value: "2026-04-09T00:00:00Z"
